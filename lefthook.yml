pre-commit:
  parallel: false
  commands:
    biome:
      glob: "*.{ts,tsx,json}"
      run: bunx biome check --staged --no-errors-on-unmatched
      stage_fixed: true
    grit:
      glob: "*.{ts,tsx,json}"
      run: bunx grit check {staged_files}
    # typecheck disabled until pre-existing desktop type errors are fixed
    # typecheck:
    #   run: bun run check
