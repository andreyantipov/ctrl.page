<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ctrl.page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fafafa;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .titlebar {
            -webkit-app-region: drag;
            height: 40px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            padding-left: 80px;
            font-size: 13px;
            color: #888;
            user-select: none;
        }
        #root {
            flex: 1;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="titlebar">ctrl.page</div>
    <div id="root"></div>
    <script src="index.js"></script>
</body>
</html>
